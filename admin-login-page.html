<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin — MyDevice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.jpg" type="image/jpeg">
  <style>
    .pg-login {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      background: #111;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .login-card h2 em {
      color: #2196F3;
      font-style: normal;
    }
    .login-card p {
      color: #666;
      font-size: 0.85rem;
      margin-bottom: 2rem;
    }
    .login-err {
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.3);
      color: #ff3b30;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .login-err:not(:empty) { display: block; }
    .login-card .f-group {
      margin-bottom: 1.25rem;
    }
    .login-card .f-group label {
      display: block;
      color: #888;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }
    .login-card .f-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color .2s;
      box-sizing: border-box;
    }
    .login-card .f-group input:focus {
      border-color: #2196F3;
    }
    .btn-login {
      width: 100%;
      background: #2196F3;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { background: #1976D2; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body data-page="login">

<nav>
  <a href="index.html" class="nav-brand">
    <img src="logo.jpg" alt="MyDevice">
    <span class="nav-brand-name">My<em>Device</em></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Catalogo</a></li>
    <li><a href="contatti.html">Contatti</a></li>
  </ul>
  <div class="burger" role="button" aria-label="menu">
    <span></span><span></span><span></span>
  </div>
</nav>

<section class="pg-login">
  <div class="login-card">
    <h2>Area <em>Admin</em></h2>
    <p>Accedi con le credenziali amministratore.</p>
    <div class="login-err" id="loginErr"></div>
    <form id="loginForm" autocomplete="off">
      <div class="f-group">
        <label>Username</label>
        <input type="text" id="lUser" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="f-group">
        <label>Password</label>
        <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Accedi</button>
    </form>
  </div>
</section>

<footer>
  <div class="footer-brand">
    <img src="logo.jpg" alt="MyDevice">
    <span class="footer-brand-name">MyDevice</span>
  </div>
  <ul class="footer-nav">
    <li><a href="index.html">Catalogo</a></li>
  </ul>
  <p class="footer-copy">© 2025 MyDevice · Bologna, Italia</p>
</footer>

<div class="toasts"></div>
<script src="script.js"></script>
</body>
</html>
