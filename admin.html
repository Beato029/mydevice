<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MyDevice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo.jpg" type="image/jpeg">
</head>
<body data-page="admin">

<nav>
  <a href="index.html" class="nav-brand">
    <img src="logo.jpg" alt="MyDevice">
    <span class="nav-brand-name">My<em>Device</em></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Catalogo</a></li>
    <li><a href="contatti.html">Contatti</a></li>
  </ul>
  <div class="burger" role="button" aria-label="menu">
    <span></span><span></span><span></span>
  </div>
</nav>

<section class="pg-admin">
  <div class="admin-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:0.5rem">
    <div>
      <h1 class="pg-title" style="margin-bottom:0">Pannello <em>Admin</em></h1>
      <p class="pg-sub" style="margin-top:0.25rem">Gestisci il catalogo.</p>
    </div>
    <button id="btnLogout" style="background:#1a1a1a;border:1px solid #333;color:#888;border-radius:8px;padding:0.5rem 1.25rem;font-size:0.85rem;cursor:pointer;transition:color .2s,border-color .2s" onmouseover="this.style.color='#ff3b30';this.style.borderColor='rgba(255,59,48,.4)'" onmouseout="this.style.color='#888';this.style.borderColor='#333'">Esci</button>
  </div>

  <div class="admin-layout">

    <div class="admin-form">
      <h3 id="aFormTitle">Aggiungi prodotto</h3>
      <form id="aForm">
        <input type="hidden" id="aEditId" value="">
        <div class="f-group">
          <label>Nome *</label>
          <input type="text" id="aNome" placeholder="iPhone 15 Pro Max" required>
        </div>
        <div class="f-group">
          <label>Prezzo € *</label>
          <input type="number" id="aPrezzo" placeholder="999" min="1" required>
        </div>
        <div class="f-group">
          <label>Immagini — carica file (più di una)</label>
          <input type="file" id="aImgFile" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:0.6rem 0.75rem;color:#aaa;width:100%;box-sizing:border-box;font-size:0.85rem;cursor:pointer">
        </div>
        <div class="f-group">
          <label>oppure aggiungi per URL</label>
          <div style="display:flex;gap:0.5rem">
            <input type="url" id="aImgUrl" placeholder="https://..." style="flex:1">
            <button type="button" id="aImgUrlAdd" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#2196F3;border-radius:8px;padding:0 0.9rem;cursor:pointer;font-size:1.1rem;line-height:1">+</button>
          </div>
        </div>
        <div class="f-group" id="imgGalleryWrap" style="display:none">
          <label>Immagini prodotto — la prima è la copertina (trascina o usa le frecce)</label>
          <div id="imgGallery" class="admin-imgs"></div>
        </div>
        <div class="f-group">
          <label>Colore *</label>
          <select id="aCol" required>
            <option value="">—</option>
            <option>Nero</option><option>Bianco</option><option>Oro</option>
            <option>Blu</option><option>Rosa</option><option>Verde</option>
            <option>Viola</option><option>Rosso</option><option>Titanio</option><option>Argento</option>
          </select>
        </div>
        <div class="f-group">
          <label>Batteria *</label>
          <select id="aBat" required>
            <option value="">—</option>
            <option>Nuova</option><option>Ottima</option>
            <option>Buona</option><option>Usurata</option>
          </select>
        </div>
        <div class="f-group">
          <label>Condizioni *</label>
          <select id="aCon" required>
            <option value="">—</option>
            <option>Perfetto</option><option>Ottimo</option>
            <option>Buono</option><option>Pessimo</option>
          </select>
        </div>
        <div class="f-group">
          <label>Descrizione</label>
          <textarea id="aDesc" placeholder="Note sul dispositivo..." style="min-height:72px"></textarea>
        </div>
        <button type="submit" class="btn-add">Aggiungi</button>
        <button type="button" class="btn-cancel" id="aCancel" style="display:none;width:100%;margin-top:0.5rem;background:#1a1a1a;border:1px solid #333;color:#888;border-radius:8px;padding:0.7rem;cursor:pointer;font-size:0.85rem">Annulla modifica</button>
      </form>
    </div>

    <div class="admin-list">
      <h3>Catalogo attuale</h3>
      <div id="aList"></div>

      <div class="admin-pw" style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid #2a2a2a">
        <h3>Cambia password</h3>
        <form id="pwForm">
          <div class="f-group">
            <label>Password attuale *</label>
            <input type="password" id="pwCurrent" placeholder="••••••••" autocomplete="current-password" required>
          </div>
          <div class="f-group">
            <label>Nuova password *</label>
            <input type="password" id="pwNext" placeholder="almeno 6 caratteri" autocomplete="new-password" required>
          </div>
          <div class="f-group">
            <label>Conferma nuova password *</label>
            <input type="password" id="pwConfirm" placeholder="ripeti la nuova password" autocomplete="new-password" required>
          </div>
          <div class="login-err" id="pwErr" style="display:none;margin-bottom:0.6rem"></div>
          <button type="submit" class="btn-add" id="pwSubmit">Aggiorna password</button>
        </form>
      </div>
    </div>

  </div>
</section>

<footer>
  <div class="footer-brand">
    <img src="logo.jpg" alt="MyDevice">
    <span class="footer-brand-name">MyDevice</span>
  </div>
  <ul class="footer-nav">
    <li><a href="index.html">Catalogo</a></li>
  </ul>
  <p class="footer-copy">© 2025 MyDevice · Bologna, Italia</p>
</footer>

<div class="toasts"></div>
<script src="script.js"></script>
</body>
</html>
